# Docker Compose Override para AMBIENTE LOCAL APENAS, ISSO JAMAIS SERIA COMITTADO NA VERDADE
#
# Quando usar este arquivo:
# - Este arquivo é exclusivo para desenvolvimento local.
# - Quando você roda "docker compose up" de dentro da pasta docker/, o Docker Compose merge este override com docker-compose.yml automaticamente.
# - Em CI/produção/staging, não copie ou use este arquivo.
#  Variáveis devem vir de secrets do CI, env do servidor, etc.
#
# O que este arquivo adiciona:
# - Mailhog: servidor SMTP local que captura todos os e-mails enviados.
#   Nenhum e-mail sai para a internet, tudo é interceptado e exibido em http://localhost:8025 (interface web do Mailhog).
# - MAIL_* env vars no container do app, apontando pro Mailhog.
#
# Por que Mailhog apenas no override?
# O serviço mailhog e as variáveis MAIL_* que apontam para ele existem apenas neste arquivo.
# Se este override não for carregado (ex: CI, produção), o app não tentará conectar a um Mailhog inexistente.
# Pesquise: "docker compose override file", "environment-specific configs".
#
# Como excluir em CI:
# - Simplesmente não rodar de dentro da pasta docker/
# - Ou: docker compose -f docker/docker-compose.yml up (sem o override)

services:
  viacoes_laravel_demo_app:
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Sao_Paulo}
      APP_LOCALE: ${APP_LOCALE:-pt_BR}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-pt_BR}
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      DB_TIMEZONE: ${DB_TIMEZONE:--03:00}
      DB_CHARSET: ${DB_CHARSET:-utf8mb4}
      DB_COLLATION: ${DB_COLLATION:-utf8mb4_unicode_ci}
      # Mailhog (local-only)
      # Aponta o Laravel pro Mailhog em vez de um SMTP real.
      # O nome "mailhog" resolve para o container via DNS interno do Docker.
      # Porta 1025: SMTP (recebe os e-mails do Laravel)
      # Porta 8025: interface web (você visualiza os e-mails lá)
      # Pesquise: "Mailhog", "SMTP trap", "email testing local".
      MAIL_MAILER: ${MAIL_MAILER:-smtp}
      MAIL_HOST: ${MAIL_HOST:-mailhog}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-null}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
      MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-null}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-teste@viacoeslaravel.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-"Viações Laravel Demo"}
    depends_on:
      - mailhog

  viacoes_laravel_demo_db:
    command: --default-time-zone=${MYSQL_DEFAULT_TIMEZONE:--03:00} --character-set-server=${DB_CHARSET:-utf8mb4} --collation-server=${DB_COLLATION:-utf8mb4_unicode_ci}
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-viacoes_demo}
      MYSQL_USER: ${MYSQL_USER:-viacoes_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-viacoes_pass}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}

  # Mailhog
  # Servidor SMTP "fake" para desenvolvimento local.
  # Captura todos os e-mails enviados pelo Laravel, nada vai pra internet.
  #
  # Interface web: http://localhost:8025 pra ver todos os e-mails enviados pela aplicação, com o HTML renderizado.
  #
  # SMTP: porta 1025 (usada pelo Laravel, via MAIL_HOST=mailhog MAIL_PORT=1025)
  #
  # Este serviço existe apenas neste override.
  mailhog:
    image: mailhog/mailhog:latest
    container_name: viacoes_laravel_demo_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP: recebe e-mails do Laravel
      - "8025:8025"  # HTTP: interface web para visualizar e-mails
